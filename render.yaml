services:
  - type: web
    name: clipper-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PLATFORM_NAME
        value: Clipper
      - key: ALLOWED_ORIGINS
        value: https://repairbirds-create.github.io
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
